version: '3.8'

services:
    app:
        build: .
        ports:
            - '4000:4000'
        environment:
            - NODE_ENV=production
            - DB_HOST=postgres
            - DB_PORT=5432
            - DB_NAME=muabantainguyen
            - DB_USER=postgres
            - DB_PASSWORD=123
        depends_on:
            - postgres
        volumes:
            - ./uploads:/app/uploads
        restart: unless-stopped

    postgres:
        image: postgres:14-alpine
        environment:
            - POSTGRES_DB=muabantainguyen
            - POSTGRES_USER=postgres
            - POSTGRES_PASSWORD=123
        volumes:
            - postgres_data:/var/lib/postgresql/data
            - ./init.sql:/docker-entrypoint-initdb.d/init.sql
        ports:
            - '5432:5432'
        restart: unless-stopped

    nginx:
        image: nginx:alpine
        ports:
            - '8080:80'
            - '443:443'
        volumes:
            - ./nginx.conf:/etc/nginx/nginx.conf
            - ./ssl:/etc/nginx/ssl
        depends_on:
            - app
        restart: unless-stopped

volumes:
    postgres_data:
