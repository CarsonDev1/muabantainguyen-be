version: '3.8'

services:
    app:
        build: .
        network_mode: 'host'
        environment:
            - NODE_ENV=production
            - DB_HOST=postgres
            - DB_PORT=5432
            - DB_NAME=muabantainguyen
            - DB_USER=postgres
            - DB_PASSWORD=muabantainguyen123
        volumes:
            - ./uploads:/app/uploads
        restart: unless-stopped

    nginx:
        image: nginx:alpine
        network_mode: 'host'
        volumes:
            - ./nginx.conf:/etc/nginx/nginx.conf:ro
            - ./ssl:/etc/nginx/ssl:ro
        depends_on:
            - app
        restart: unless-stopped

volumes:
    uploads:
