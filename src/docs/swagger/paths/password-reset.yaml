forgot:
    post:
        summary: Request password reset
        tags: [Password Reset]
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        type: object
                        properties:
                            email:
                                type: string
                                format: email
                                example: user@example.com
                        required: [email]
        responses:
            200:
                description: Password reset request sent (always returns success for security)
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                success:
                                    type: boolean
                                    example: true
                                message:
                                    type: string
                                    example: Password reset request sent
            400:
                description: Bad request - Missing email
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                success:
                                    type: boolean
                                    example: false
                                message:
                                    type: string
                                    example: Email is required

reset:
    post:
        summary: Reset password with token
        tags: [Password Reset]
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        type: object
                        properties:
                            token:
                                type: string
                                example: abc123def456
                                description: Reset token received via email
                            newPassword:
                                type: string
                                minLength: 6
                                example: newpassword123
                                description: New password to set
                        required: [token, newPassword]
        responses:
            200:
                description: Password reset successfully
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                success:
                                    type: boolean
                                    example: true
                                message:
                                    type: string
                                    example: Password reset successfully
            400:
                description: Bad request - Invalid or expired token
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                success:
                                    type: boolean
                                    example: false
                                message:
                                    type: string
                                    example: Invalid or expired token
                                error:
                                    type: string
