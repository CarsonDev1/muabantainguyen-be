enable-2fa:
    post:
        summary: Enable 2FA for user
        security:
            - bearerAuth: []
        tags: [Security]
        responses:
            200:
                description: 2FA enabled successfully
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                message:
                                    type: string
                                    example: 2FA enabled successfully
                                otpauth:
                                    type: string
                                    description: OTP auth URL for QR code generation
                                    example: otpauth://totp/Muabantainguyen:user@example.com?secret=JBSWY3DPEHPK3PXP&issuer=Muabantainguyen
                                qr:
                                    type: string
                                    description: Base64 encoded QR code image
                                    example: data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAA...
            401:
                $ref: '../components/responses.yaml#/Unauthorized'

disable-2fa:
    post:
        summary: Disable 2FA for user
        security:
            - bearerAuth: []
        tags: [Security]
        responses:
            200:
                description: 2FA disabled successfully
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                message:
                                    type: string
                                    example: 2FA disabled successfully
                                success:
                                    type: boolean
                                    example: true
            401:
                $ref: '../components/responses.yaml#/Unauthorized'

verify-2fa:
    post:
        summary: Verify 2FA token
        security:
            - bearerAuth: []
        tags: [Security]
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        type: object
                        properties:
                            token:
                                type: string
                                example: '123456'
                                pattern: '^[0-9]{6}$'
                                description: 6-digit TOTP code from authenticator app
                        required: [token]
        responses:
            200:
                description: Token verification result
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                message:
                                    type: string
                                    example: 2FA token verified successfully
                                valid:
                                    type: boolean
                                    example: true
                                    description: Whether the token is valid or not
            400:
                description: Bad request - Missing or invalid token
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                success:
                                    type: boolean
                                    example: false
                                message:
                                    type: string
                                    example: Missing token
            401:
                $ref: '../components/responses.yaml#/Unauthorized'
