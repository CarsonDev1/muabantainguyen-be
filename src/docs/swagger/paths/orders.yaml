checkout:
    post:
        summary: Checkout current cart into an order
        security:
            - bearerAuth: []
        tags: [Orders]
        requestBody:
            required: false
            content:
                application/json:
                    schema:
                        type: object
                        properties:
                            paymentMethod:
                                type: string
                                enum: [sepay, momo, vnpay]
                                example: sepay
        responses:
            201:
                description: Order created successfully
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                message:
                                    type: string
                                    example: Order created successfully
                                orderId:
                                    type: string
                                    format: uuid
                                total:
                                    type: number
                                    example: 150000
            400:
                description: Bad request - Cart is empty or validation error
                content:
                    application/json:
                        schema:
                            $ref: '../components/responses.yaml#/BadRequest'
            401:
                $ref: '../components/responses.yaml#/Unauthorized'

list:
    get:
        summary: List user's orders with pagination
        security:
            - bearerAuth: []
        tags: [Orders]
        parameters:
            - name: page
              in: query
              schema:
                  type: integer
                  minimum: 1
                  default: 1
              description: Page number
            - name: pageSize
              in: query
              schema:
                  type: integer
                  minimum: 1
                  maximum: 100
                  default: 20
              description: Items per page
        responses:
            200:
                description: Orders retrieved successfully
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                message:
                                    type: string
                                    example: Orders retrieved successfully
                                items:
                                    type: array
                                    items:
                                        $ref: '../components/schemas.yaml#/Order'
            401:
                $ref: '../components/responses.yaml#/Unauthorized'

detail:
    get:
        summary: Get order detail
        security:
            - bearerAuth: []
        tags: [Orders]
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: string
                  format: uuid
              description: Order ID
        responses:
            200:
                description: Order retrieved successfully
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                message:
                                    type: string
                                    example: Order retrieved successfully
                                order:
                                    $ref: '../components/schemas.yaml#/OrderDetail'
            404:
                $ref: '../components/responses.yaml#/NotFound'
            401:
                $ref: '../components/responses.yaml#/Unauthorized'
