create:
    post:
        summary: Admin - Create new category
        security:
            - bearerAuth: []
        tags: [Admin Categories]
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        type: object
                        properties:
                            name:
                                type: string
                                example: Gaming Accounts
                            slug:
                                type: string
                                example: gaming-accounts
                            parentId:
                                type: string
                                format: uuid
                                description: Parent category ID (optional for root categories)
                        required: [name, slug]
        responses:
            201:
                description: Category created successfully
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                success:
                                    type: boolean
                                    example: true
                                message:
                                    type: string
                                id:
                                    type: string
                                    format: uuid
            403:
                description: Forbidden - requires categories.manage permission

crud:
    put:
        summary: Admin - Update category
        security:
            - bearerAuth: []
        tags: [Admin Categories]
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: string
                  format: uuid
        requestBody:
            required: false
            content:
                application/json:
                    schema:
                        type: object
                        properties:
                            name:
                                type: string
                            slug:
                                type: string
                            parentId:
                                type: string
                                format: uuid
        responses:
            200:
                $ref: '../../components/responses.yaml#/Success'
            404:
                $ref: '../../components/responses.yaml#/NotFound'
            403:
                description: Forbidden - requires categories.manage permission
    delete:
        summary: Admin - Delete category
        security:
            - bearerAuth: []
        tags: [Admin Categories]
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: string
                  format: uuid
        responses:
            200:
                $ref: '../../components/responses.yaml#/Success'
            404:
                $ref: '../../components/responses.yaml#/NotFound'
            403:
                description: Forbidden - requires categories.manage permission

tree:
    get:
        summary: Admin - Get category tree structure
        security:
            - bearerAuth: []
        tags: [Admin Categories]
        responses:
            200:
                description: Category tree retrieved successfully
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                success:
                                    type: boolean
                                    example: true
                                message:
                                    type: string
                                tree:
                                    type: array
                                    items:
                                        $ref: '../../components/schemas.yaml#/CategoryTree'
            403:
                description: Forbidden - requires categories.manage permission
