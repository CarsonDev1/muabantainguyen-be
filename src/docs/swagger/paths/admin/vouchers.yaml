list-create:
    get:
        summary: Admin - List all vouchers
        security:
            - bearerAuth: []
        tags: [Admin Vouchers]
        responses:
            200:
                description: Vouchers retrieved successfully
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                success:
                                    type: boolean
                                    example: true
                                message:
                                    type: string
                                    example: Vouchers retrieved successfully
                                vouchers:
                                    type: array
                                    items:
                                        $ref: '../../components/schemas.yaml#/Voucher'
            403:
                description: Forbidden - admin access required
    post:
        summary: Admin - Create new voucher
        security:
            - bearerAuth: []
        tags: [Admin Vouchers]
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        type: object
                        properties:
                            code:
                                type: string
                                example: DISCOUNT10
                                description: Unique voucher code
                            description:
                                type: string
                                example: 10% discount for new users
                            discount_percent:
                                type: integer
                                minimum: 0
                                maximum: 100
                                example: 10
                                description: Percentage discount (0-100)
                            discount_amount:
                                type: number
                                example: 50000
                                description: Fixed amount discount
                            max_uses:
                                type: integer
                                example: 100
                                description: Maximum number of times voucher can be used
                            valid_from:
                                type: string
                                format: date-time
                                example: '2024-01-01T00:00:00Z'
                            valid_to:
                                type: string
                                format: date-time
                                example: '2024-12-31T23:59:59Z'
                            is_active:
                                type: boolean
                                default: true
                        required: [code]
        responses:
            201:
                description: Voucher created successfully
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                success:
                                    type: boolean
                                    example: true
                                message:
                                    type: string
                                    example: Voucher created successfully
                                id:
                                    type: string
                                    format: uuid
            400:
                $ref: '../../components/responses.yaml#/BadRequest'
            403:
                description: Forbidden - admin access required

crud:
    put:
        summary: Admin - Update voucher
        security:
            - bearerAuth: []
        tags: [Admin Vouchers]
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: string
                  format: uuid
        requestBody:
            required: false
            content:
                application/json:
                    schema:
                        type: object
                        properties:
                            code:
                                type: string
                            description:
                                type: string
                            discount_percent:
                                type: integer
                                minimum: 0
                                maximum: 100
                            discount_amount:
                                type: number
                            max_uses:
                                type: integer
                            valid_from:
                                type: string
                                format: date-time
                            valid_to:
                                type: string
                                format: date-time
                            is_active:
                                type: boolean
        responses:
            200:
                $ref: '../../components/responses.yaml#/Success'
            404:
                $ref: '../../components/responses.yaml#/NotFound'
            403:
                description: Forbidden - admin access required
    delete:
        summary: Admin - Delete voucher
        security:
            - bearerAuth: []
        tags: [Admin Vouchers]
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: string
                  format: uuid
        responses:
            200:
                $ref: '../../components/responses.yaml#/Success'
            404:
                $ref: '../../components/responses.yaml#/NotFound'
            403:
                description: Forbidden - admin access required
