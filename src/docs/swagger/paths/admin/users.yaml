list:
    get:
        summary: Admin - List users with pagination, search and filters
        security:
            - bearerAuth: []
        tags: [Admin Users]
        parameters:
            - name: page
              in: query
              schema:
                  type: integer
                  default: 1
              description: Page number
            - name: pageSize
              in: query
              schema:
                  type: integer
                  default: 20
              description: Number of items per page
            - name: search
              in: query
              schema:
                  type: string
              description: Search in name, email, phone
            - name: role
              in: query
              schema:
                  type: string
                  enum: [user, admin, staff]
              description: Filter by role
            - name: isBlocked
              in: query
              schema:
                  type: string
                  enum: ['true', 'false', '']
              description: Filter by blocked status
            - name: sortBy
              in: query
              schema:
                  type: string
                  enum: [created_at, name, email, role]
                  default: created_at
              description: Sort field
            - name: sortOrder
              in: query
              schema:
                  type: string
                  enum: [ASC, DESC]
                  default: DESC
              description: Sort order
        responses:
            200:
                description: Users retrieved successfully
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                success:
                                    type: boolean
                                    example: true
                                message:
                                    type: string
                                users:
                                    type: array
                                    items:
                                        $ref: '../../components/schemas.yaml#/User'
                                pagination:
                                    $ref: '../../components/schemas.yaml#/Pagination'
            403:
                description: Forbidden - requires users.view permission

block:
    put:
        summary: Admin - Block/unblock user
        security:
            - bearerAuth: []
        tags: [Admin Users]
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: string
                  format: uuid
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        type: object
                        properties:
                            blocked:
                                type: boolean
                                description: True to block user, false to unblock
                        required: [blocked]
        responses:
            200:
                description: User status updated successfully
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                success:
                                    type: boolean
                                    example: true
                                message:
                                    type: string
                                    example: User status updated successfully
            404:
                $ref: '../../components/responses.yaml#/NotFound'
            403:
                description: Forbidden - requires users.block permission

orders:
    get:
        summary: Admin - Get user orders
        security:
            - bearerAuth: []
        tags: [Admin Users]
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: string
                  format: uuid
              description: User ID
        responses:
            200:
                description: User orders retrieved successfully
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                success:
                                    type: boolean
                                    example: true
                                message:
                                    type: string
                                    example: User orders retrieved successfully
                                orders:
                                    type: array
                                    items:
                                        $ref: '../../components/schemas.yaml#/Order'
            404:
                $ref: '../../components/responses.yaml#/NotFound'
            403:
                description: Forbidden - requires orders.view permission
