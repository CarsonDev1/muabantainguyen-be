settings:
    get:
        summary: Get all site settings (admin only)
        security:
            - bearerAuth: []
        tags: [Site Settings]
        responses:
            200:
                description: Settings retrieved successfully
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                success:
                                    type: boolean
                                    example: true
                                message:
                                    type: string
                                    example: Settings retrieved successfully
                                settings:
                                    type: object
                                    additionalProperties:
                                        type: object
                                        additionalProperties:
                                            type: object
                                            properties:
                                                value:
                                                    type: string
                                                type:
                                                    type: string
                                                    enum: [text, number, boolean, json, image]
                                                display_name:
                                                    type: string
                                                description:
                                                    type: string
                                                is_public:
                                                    type: boolean
                                    example:
                                        branding:
                                            site_name:
                                                value: Muabantainguyen
                                                type: text
                                                display_name: Tên website
                                                description: Tên hiển thị của website
                                                is_public: true
                                            site_logo:
                                                value: https://logo-url.com
                                                type: image
                                                display_name: Logo website
                                                description: URL logo chính
                                                is_public: true
                                        contact:
                                            contact_email:
                                                value: contact@shop.com
                                                type: text
                                                display_name: Email liên hệ
                                                description: Email hỗ trợ khách hàng
                                                is_public: true
                                            contact_phone:
                                                value: '0123456789'
                                                type: text
                                                display_name: Số điện thoại
                                                description: Hotline hỗ trợ
                                                is_public: true
                                        system:
                                            maintenance_mode:
                                                value: 'false'
                                                type: boolean
                                                display_name: Chế độ bảo trì
                                                description: Bật/tắt chế độ bảo trì website
                                                is_public: false
            403:
                description: Forbidden - requires settings.view permission
    put:
        summary: Update site settings
        security:
            - bearerAuth: []
        tags: [Site Settings]
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        type: object
                        additionalProperties:
                            type: string
                        example:
                            site_name: My New Shop Name
                            site_logo: https://new-logo-url.com
                            contact_email: newcontact@shop.com
                            contact_phone: '0987654321'
                            maintenance_mode: 'false'
                            allow_registration: 'true'
                            seo_title: New SEO Title
                            seo_description: New SEO Description
                            default_currency: USD
        responses:
            200:
                description: Settings updated successfully
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                success:
                                    type: boolean
                                    example: true
                                message:
                                    type: string
                                    example: Settings updated successfully
            400:
                $ref: '../../components/responses.yaml#/BadRequest'
            403:
                description: Forbidden - requires settings.edit permission
