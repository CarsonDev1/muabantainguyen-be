faqs:
    get:
        summary: Admin - List all FAQs
        security:
            - bearerAuth: []
        tags: [Admin Content]
        responses:
            200:
                description: FAQs retrieved successfully
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                success:
                                    type: boolean
                                    example: true
                                message:
                                    type: string
                                faqs:
                                    type: array
                                    items:
                                        $ref: '../../components/schemas.yaml#/FAQ'
            403:
                description: Forbidden - requires settings.view permission
    post:
        summary: Admin - Create new FAQ
        security:
            - bearerAuth: []
        tags: [Admin Content]
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        type: object
                        properties:
                            question:
                                type: string
                                example: How do I reset my password?
                            answer:
                                type: string
                                example: Click on 'Forgot Password' on the login page...
                            is_active:
                                type: boolean
                                default: true
                        required: [question, answer]
        responses:
            201:
                description: FAQ created successfully
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                success:
                                    type: boolean
                                    example: true
                                message:
                                    type: string
                                id:
                                    type: string
                                    format: uuid
            403:
                description: Forbidden - requires settings.edit permission

faq-detail:
    put:
        summary: Admin - Update FAQ
        security:
            - bearerAuth: []
        tags: [Admin Content]
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: string
                  format: uuid
        requestBody:
            required: false
            content:
                application/json:
                    schema:
                        type: object
                        properties:
                            question:
                                type: string
                            answer:
                                type: string
                            is_active:
                                type: boolean
        responses:
            200:
                $ref: '../../components/responses.yaml#/Success'
            404:
                $ref: '../../components/responses.yaml#/NotFound'
            403:
                description: Forbidden - requires settings.edit permission
    delete:
        summary: Admin - Delete FAQ
        security:
            - bearerAuth: []
        tags: [Admin Content]
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: string
                  format: uuid
        responses:
            200:
                $ref: '../../components/responses.yaml#/Success'
            404:
                $ref: '../../components/responses.yaml#/NotFound'
            403:
                description: Forbidden - requires settings.edit permission

