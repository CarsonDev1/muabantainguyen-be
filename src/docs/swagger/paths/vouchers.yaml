apply:
    post:
        summary: Apply voucher code to get discount
        security:
            - bearerAuth: []
        tags: [Vouchers]
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        type: object
                        properties:
                            code:
                                type: string
                                example: DISCOUNT10
                                description: Voucher code to apply
                            amount:
                                type: number
                                example: 100000
                                description: Original amount before discount
                        required: [code, amount]
        responses:
            200:
                description: Voucher applied successfully
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                message:
                                    type: string
                                    example: Voucher applied successfully
                                discountedAmount:
                                    type: number
                                    example: 90000
                                    description: Final amount after applying discount
            400:
                description: Bad request - Invalid voucher or expired
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                success:
                                    type: boolean
                                    example: false
                                message:
                                    type: string
                                    enum:
                                        - Missing fields
                                        - Voucher not valid
                                        - Voucher limit reached
            404:
                description: Voucher not found
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                success:
                                    type: boolean
                                    example: false
                                message:
                                    type: string
                                    example: Voucher not found
            401:
                $ref: '../components/responses.yaml#/Unauthorized'
