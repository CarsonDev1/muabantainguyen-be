openapi: 3.0.3
info:
    title: Muabantainguyen API
    version: 0.3.0
    description: Digital products marketplace API with role-based permissions

servers:
    - url: http://localhost:4000
      description: Development server

# Import các paths từ file riêng
paths:
    # System
    /api/health:
        $ref: './paths/system.yaml#/health'

    # Authentication
    /api/auth/register:
        $ref: './paths/auth.yaml#/register'
    /api/auth/login:
        $ref: './paths/auth.yaml#/login'
    /api/auth/logout:
        $ref: './paths/auth.yaml#/logout'
    /api/auth/refresh:
        $ref: './paths/auth.yaml#/refresh'
    /api/auth/me:
        $ref: './paths/auth.yaml#/me'
    /api/auth/change-password:
        $ref: './paths/auth.yaml#/change-password'

    # Password Reset
    /api/password/forgot:
        $ref: './paths/password-reset.yaml#/forgot'
    /api/password/reset:
        $ref: './paths/password-reset.yaml#/reset'

    # Public Products
    /api/products:
        $ref: './paths/products.yaml#/list'
    /api/products/{slug}:
        $ref: './paths/products.yaml#/detail'
    /api/products/categories:
        $ref: './paths/products.yaml#/categories'

    # Cart
    /api/cart:
        $ref: './paths/cart.yaml#/cart'
    /api/cart/add:
        $ref: './paths/cart.yaml#/add'
    /api/cart/update:
        $ref: './paths/cart.yaml#/update'
    /api/cart/remove:
        $ref: './paths/cart.yaml#/remove'
    /api/cart/clear:
        $ref: './paths/cart.yaml#/clear'

    # Orders
    /api/orders/checkout:
        $ref: './paths/orders.yaml#/checkout'
    /api/orders:
        $ref: './paths/orders.yaml#/list'
    /api/orders/{id}:
        $ref: './paths/orders.yaml#/detail'

    # Payments
    /api/payments/start:
        $ref: './paths/payments.yaml#/start'
    /api/payments/checkout:
        $ref: './paths/payments.yaml#/checkout'
    /api/payments/webhook/sepay:
        $ref: './paths/payments.yaml#/webhook'

    # Vouchers
    /api/vouchers/apply:
        $ref: './paths/vouchers.yaml#/apply'

    # Security
    /api/security/2fa/enable:
        $ref: './paths/security.yaml#/enable-2fa'
    /api/security/2fa/disable:
        $ref: './paths/security.yaml#/disable-2fa'
    /api/security/2fa/verify:
        $ref: './paths/security.yaml#/verify-2fa'

    # File Upload
    /api/uploads/images:
        $ref: './paths/uploads.yaml#/images'
    /api/uploads/avatar:
        $ref: './paths/uploads.yaml#/avatar'
    /api/uploads/product:
        $ref: './paths/uploads.yaml#/product'

    # User Resources
    /api/resources:
        $ref: './paths/resources.yaml#/list'

    # Public endpoints
    /api/public/settings:
        $ref: './paths/public.yaml#/settings'
    /api/public/faqs:
        $ref: './paths/public.yaml#/faqs'
    /api/public/announcements:
        $ref: './paths/public.yaml#/announcements'
    /api/public/categories/tree:
        $ref: './paths/public.yaml#/categories-tree'

    # Admin - User Management
    /api/admin/users:
        $ref: './paths/admin/users.yaml#/list'
    /api/admin/users/{id}/block:
        $ref: './paths/admin/users.yaml#/block'
    /api/admin/users/{id}/orders:
        $ref: './paths/admin/users.yaml#/orders'

    # Admin - Product Management
    /api/admin/products:
        $ref: './paths/admin/products.yaml#/list-create'
    /api/admin/products/{id}:
        $ref: './paths/admin/products.yaml#/crud'

    # Admin - Category Management
    /api/admin/categories:
        $ref: './paths/admin/categories.yaml#/create'
    /api/admin/categories/{id}:
        $ref: './paths/admin/categories.yaml#/crud'
    /api/admin/categories/tree:
        $ref: './paths/admin/categories.yaml#/tree'

    # Admin - Voucher Management
    /api/admin/vouchers:
        $ref: './paths/admin/vouchers.yaml#/list-create'
    /api/admin/vouchers/{id}:
        $ref: './paths/admin/vouchers.yaml#/crud'

    # Admin - Content Management (FAQ & Announcements)
    /api/admin/faqs:
        $ref: './paths/admin/content.yaml#/faqs'
    /api/admin/faqs/{id}:
        $ref: './paths/admin/content.yaml#/faq-detail'
    /api/admin/announcements:
        $ref: './paths/admin/content.yaml#/announcements'
    /api/admin/announcements/{id}:
        $ref: './paths/admin/content.yaml#/announcement-detail'

    # Admin - Role & Permission Management
    /api/admin/admins:
        $ref: './paths/admin/management.yaml#/admins'
    /api/admin/admins/{id}/role:
        $ref: './paths/admin/management.yaml#/admin-role'
    /api/admin/roles:
        $ref: './paths/admin/management.yaml#/roles'
    /api/admin/permissions:
        $ref: './paths/admin/management.yaml#/permissions'

    # Admin - Settings
    /api/admin/settings:
        $ref: './paths/admin/settings.yaml#/settings'

# Import components
components:
    $ref: './components/index.yaml'

# Tags
tags:
    - name: System
      description: Health checks and system status
    - name: Authentication
      description: User authentication and profile
    - name: Password Reset
      description: Password reset functionality
    - name: Products
      description: Public product catalog
    - name: Cart
      description: Shopping cart management
    - name: Orders
      description: Order processing
    - name: Payments
      description: Payment processing
    - name: Vouchers
      description: Discount vouchers
    - name: Security
      description: 2FA and security features
    - name: File Upload
      description: File and image uploads
    - name: User Resources
      description: Purchased digital resources
    - name: Public
      description: Public endpoints
    - name: Admin Users
      description: Admin user management
    - name: Admin Products
      description: Admin product management
    - name: Admin Categories
      description: Admin category management
    - name: Admin Vouchers
      description: Admin voucher management
    - name: Admin Management
      description: Admin role management
    - name: Roles & Permissions
      description: Permission system
    - name: Site Settings
      description: Website configuration
